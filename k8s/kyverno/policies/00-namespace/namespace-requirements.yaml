# Policy: Namespace Label Requirements
#
# Purpose:
#   Enforces consistent labeling on all namespaces for governance and tracking.
#   Required labels enable cost allocation, access control, and resource management.
#
# Required Labels:
#   - team: Team or organization owning the namespace (e.g., "devops", "platform")
#   - purpose: Namespace purpose (e.g., "application", "database", "monitoring")
#
# Optional Labels:
#   - environment: Environment type (e.g., "dev", "staging", "prod")
#
# Validation Mode: Audit (logs violations, allows creation)
#
# Security Impact: MEDIUM
#   - Improves audit trail and compliance
#   - Enables RBAC policies based on labels
#   - Supports cost allocation and chargeback
#
# Exempted Namespaces:
#   - kube-* (system namespaces)
#   - default, kyverno, argocd, monitoring, logging
#
# Example Compliant Namespace:
#   apiVersion: v1
#   kind: Namespace
#   metadata:
#     name: my-app
#     labels:
#       team: "platform"
#       purpose: "application"
#       environment: "dev"
#
# Example Violation:
#   Namespace without 'team' or 'purpose' labels will be logged in policy reports
#
# Related Documentation:
#   - docs/KYVERNO-Policy-CheatSheet.md
#   - docs/SECURITY-BestPractices.md
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: namespace-requirements
  annotations:
    policies.kyverno.io/title: Namespace Requirements
    policies.kyverno.io/category: Namespaces
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Namespace
    policies.kyverno.io/description: >-
      Namespaces must have 'team' and 'purpose' labels for proper
      organization and tracking. This helps with cost allocation,
      access control, and resource management.
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: require-namespace-labels
    match:
      any:
      - resources:
          kinds:
          - Namespace
    exclude:
      any:
      - resources:
          names:
          - kube-*
          - default
          - kyverno
          - argocd
          - monitoring
          - logging
    validate:
      message: >-
        Namespaces must have 'team' and 'purpose' labels.

        Example:
          metadata:
            labels:
              team: "devops"
              purpose: "application"
              environment: "demo"
      pattern:
        metadata:
          labels:
            team: "?*"
            purpose: "?*"
