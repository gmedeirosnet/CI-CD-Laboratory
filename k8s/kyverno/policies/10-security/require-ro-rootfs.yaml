# Policy: Require Read-Only Root Filesystem
#
# Purpose:
#   Enforces read-only root filesystem for containers to prevent
#   malware persistence and enforce immutable infrastructure.
#
# Validation Mode: Audit (logs violations, allows deployment)
#
# Security Impact: MEDIUM
#   - Prevents malware from modifying container filesystem
#   - Blocks persistence of unauthorized changes
#   - Enforces immutable infrastructure principles
#   - Limits post-compromise damage
#
# Why Read-Only Root Filesystem Matters:
#   - Malware can't persist across container restarts
#   - Prevents tampering with application binaries
#   - Enforces declarative configuration
#   - Simplifies security auditing
#
# Implementation Requirements:
#   - Mount temporary volumes for writable directories
#   - Common writable paths: /tmp, /var/cache, /var/run
#   - Application-specific cache directories
#
# Exempted Namespaces:
#   - kube-system, kube-public, kube-node-lease
#   - kyverno, argocd, monitoring, logging
#
# Example Violation:
#   spec:
#     containers:
#     - name: app
#       image: nginx
#       # No readOnlyRootFilesystem = writable
#
# Example Compliant:
#   spec:
#     containers:
#     - name: app
#       image: nginx
#       securityContext:
#         readOnlyRootFilesystem: true
#       volumeMounts:
#       - name: tmp
#         mountPath: /tmp
#       - name: cache
#         mountPath: /var/cache/nginx
#     volumes:
#     - name: tmp
#       emptyDir: {}
#     - name: cache
#       emptyDir: {}
#
# Common Writable Directories:
#   - /tmp - Temporary files
#   - /var/cache - Application cache
#   - /var/run - Runtime data (PID files, sockets)
#   - /var/log - Application logs (use stdout/stderr instead)
#
# Migration Strategy:
#   1. Identify writable directories (run container, check errors)
#   2. Add emptyDir volumes for each writable path
#   3. Test application functionality
#   4. Enable readOnlyRootFilesystem
#
# Related Documentation:
#   - docs/KYVERNO-Policy-CheatSheet.md
#   - docs/SECURITY-BestPractices.md (Container Security section)
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-ro-rootfs
  annotations:
    policies.kyverno.io/title: Require Read-Only Root Filesystem
    policies.kyverno.io/category: Security
    policies.kyverno.io/severity: low
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Containers should use a read-only root filesystem to prevent
      malicious code from writing to the container filesystem.
      Applications requiring write access should use volume mounts.
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: check-ro-rootfs
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kube-public
          - kube-node-lease
          - kyverno
          - argocd
          - monitoring
          - logging
    validate:
      message: >-
        Root filesystem should be read-only.
        Set securityContext.readOnlyRootFilesystem: true

        If your app needs to write, use emptyDir or persistent volumes.

        Example:
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
          - name: tmp
            mountPath: /tmp
      pattern:
        spec:
          containers:
          - securityContext:
              readOnlyRootFilesystem: true
